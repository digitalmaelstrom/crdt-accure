<svg xmlns="http://www.w3.org/2000/svg" width="780" height="400" viewBox="0 0 780 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="400" fill="#ffffff"/>
  <text x="390" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b1f23">fig1_policy_convergence_integrity</text>
  <text x="390" y="48" text-anchor="middle" font-size="12" fill="#586069">Two concurrent, mutually-revoking admin denies converge to the same decision on all three sites</text>

  <!-- three lanes -->
  <text x="40" y="103" font-size="14" font-weight="bold" fill="#1b1f23">S1</text>
  <line x1="60" y1="95" x2="430" y2="95" stroke="#d1d5da" stroke-width="2"/>
  <text x="40" y="163" font-size="14" font-weight="bold" fill="#1b1f23">S2</text>
  <line x1="60" y1="155" x2="430" y2="155" stroke="#d1d5da" stroke-width="2"/>
  <text x="40" y="223" font-size="14" font-weight="bold" fill="#1b1f23">S3</text>
  <line x1="60" y1="215" x2="430" y2="215" stroke="#d1d5da" stroke-width="2"/>

  <!-- S1 op -->
  <rect x="80" y="75" width="180" height="40" rx="6" fill="#ffeef0" stroke="#d73a49"/>
  <text x="170" y="93" text-anchor="middle" font-size="12" fill="#86181d">PolicyOp S1@1</text>
  <text x="170" y="108" text-anchor="middle" font-size="11" fill="#86181d">Deny S2 Admin</text>

  <!-- S2 op -->
  <rect x="80" y="135" width="180" height="40" rx="6" fill="#ffeef0" stroke="#d73a49"/>
  <text x="170" y="153" text-anchor="middle" font-size="12" fill="#86181d">PolicyOp S2@1</text>
  <text x="170" y="168" text-anchor="middle" font-size="11" fill="#86181d">Deny S1 Admin</text>

  <!-- S3 idle -->
  <text x="170" y="200" text-anchor="middle" font-size="11" fill="#6a737d">(no local op)</text>

  <!-- sync divider -->
  <line x1="320" y1="65" x2="320" y2="240" stroke="#959da5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="320" y="258" text-anchor="middle" font-size="11" fill="#586069">3 rounds of pairwise sync + rebuild</text>

  <line x1="260" y1="95" x2="315" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="155" x2="315" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- result -->
  <rect x="450" y="78" width="300" height="160" rx="8" fill="#f6f8fa" stroke="#959da5"/>
  <text x="600" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b1f23">Convergent decision (S1=S2=S3)</text>
  <text x="600" y="126" text-anchor="middle" font-size="12" fill="#1b1f23">eval(S1, Admin) — identical on all sites</text>
  <text x="600" y="148" text-anchor="middle" font-size="12" fill="#1b1f23">eval(S2, Admin) — identical on all sites</text>
  <line x1="480" y1="162" x2="720" y2="162" stroke="#d1d5da"/>
  <text x="600" y="186" text-anchor="middle" font-size="11" fill="#586069">Integrity strategy: deterministic boundary,</text>
  <text x="600" y="204" text-anchor="middle" font-size="11" fill="#586069">deny wins ties (n = n' denied at the boundary).</text>
  <text x="600" y="226" text-anchor="middle" font-size="11" fill="#586069">No site disagrees regardless of merge order.</text>

  <text x="60" y="310" font-size="12" fill="#586069">Conflict resolution: each site independently issues a revocation of the other's Admin right. The DAG-based</text>
  <text x="60" y="328" font-size="12" fill="#586069">validity evaluation (Algorithms 1 &amp; 2) is order-independent, so after full sync every replica agrees —</text>
  <text x="60" y="346" font-size="12" fill="#586069">the test asserts the three eval results are all equal rather than asserting a specific winner.</text>
</svg>
