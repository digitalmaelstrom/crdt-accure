<svg xmlns="http://www.w3.org/2000/svg" width="780" height="430" viewBox="0 0 780 430" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="430" fill="#ffffff"/>
  <text x="390" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b1f23">concurrent_batch_triggers_bulk_undo_redo</text>
  <text x="390" y="48" text-anchor="middle" font-size="12" fill="#586069">A single deny undoes a whole batch of inserts; a later allow redoes the entire batch</text>

  <!-- Phase 1: bulk undo -->
  <text x="40" y="118" font-size="14" font-weight="bold" fill="#1b1f23">S1</text>
  <line x1="60" y1="110" x2="560" y2="110" stroke="#d1d5da" stroke-width="2"/>
  <text x="40" y="208" font-size="14" font-weight="bold" fill="#1b1f23">S2</text>
  <line x1="60" y1="200" x2="560" y2="200" stroke="#d1d5da" stroke-width="2"/>

  <!-- S1 batch -->
  <rect x="80" y="88" width="210" height="44" rx="6" fill="#dbedff" stroke="#0366d6"/>
  <text x="185" y="106" text-anchor="middle" font-size="12" fill="#0b2e59">DocOps S1@1..S1@6</text>
  <text x="185" y="123" text-anchor="middle" font-size="11" fill="#0b2e59">Insert a,b,c,d,e,f  →  "abcdef"</text>

  <!-- S2 deny -->
  <rect x="80" y="180" width="200" height="40" rx="6" fill="#ffeef0" stroke="#d73a49"/>
  <text x="180" y="198" text-anchor="middle" font-size="12" fill="#86181d">PolicyOp S2@7</text>
  <text x="180" y="213" text-anchor="middle" font-size="11" fill="#86181d">Deny S1 Write (concurrent)</text>

  <!-- sync 1 -->
  <line x1="320" y1="120" x2="430" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="195" x2="430" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="178" text-anchor="middle" font-size="10" fill="#586069">sync</text>

  <rect x="460" y="92" width="290" height="120" rx="8" fill="#fff5f5" stroke="#d73a49"/>
  <text x="605" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#86181d">Bulk UNDO</text>
  <text x="605" y="138" text-anchor="middle" font-size="12" fill="#86181d">valid[S1@1..6] = false (all six)</text>
  <text x="605" y="160" text-anchor="middle" font-size="12" fill="#586069">document text on S1 and S2:</text>
  <rect x="555" y="172" width="100" height="30" rx="4" fill="#fff" stroke="#d1d5da"/>
  <text x="605" y="192" text-anchor="middle" font-size="13" fill="#6a737d">"" (empty)</text>

  <!-- Phase 2: redo -->
  <line x1="60" y1="270" x2="750" y2="270" stroke="#eaecef" stroke-width="1"/>
  <text x="40" y="318" font-size="14" font-weight="bold" fill="#1b1f23">S2</text>
  <line x1="60" y1="310" x2="560" y2="310" stroke="#d1d5da" stroke-width="2"/>

  <rect x="80" y="290" width="200" height="40" rx="6" fill="#e6ffed" stroke="#28a745"/>
  <text x="180" y="308" text-anchor="middle" font-size="12" fill="#165c26">PolicyOp S2@8</text>
  <text x="180" y="323" text-anchor="middle" font-size="11" fill="#165c26">Allow S1 Write</text>

  <line x1="290" y1="305" x2="430" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="300" text-anchor="middle" font-size="10" fill="#586069">sync</text>

  <rect x="460" y="282" width="290" height="80" rx="8" fill="#e6ffed" stroke="#28a745"/>
  <text x="605" y="304" text-anchor="middle" font-size="13" font-weight="bold" fill="#165c26">Bulk REDO</text>
  <text x="605" y="326" text-anchor="middle" font-size="12" fill="#165c26">valid[S1@1..6] = true (all six)</text>
  <rect x="555" y="334" width="100" height="22" rx="4" fill="#fff" stroke="#d1d5da"/>
  <text x="605" y="350" text-anchor="middle" font-size="12" fill="#22863a">"abcdef"</text>

  <text x="60" y="400" font-size="12" fill="#586069">Undo/redo semantics: a single policy toggle flips the validity of an entire concurrent batch at once.</text>
  <text x="60" y="418" font-size="12" fill="#586069">No per-character bookkeeping is needed — text is recomputed from the set of currently-valid DocOps.</text>
</svg>
