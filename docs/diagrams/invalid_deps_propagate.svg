<svg xmlns="http://www.w3.org/2000/svg" width="780" height="320" viewBox="0 0 780 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="xend" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,10 M10,2 L2,10" stroke="#d73a49" stroke-width="2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="320" fill="#ffffff"/>
  <text x="390" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b1f23">invalid_deps_propagate</text>
  <text x="390" y="48" text-anchor="middle" font-size="12" fill="#586069">Once a site denies its own Write right, a subsequent local insert is rejected up front</text>

  <text x="40" y="138" font-size="14" font-weight="bold" fill="#1b1f23">S1</text>
  <line x1="60" y1="130" x2="720" y2="130" stroke="#d1d5da" stroke-width="2"/>

  <!-- deny -->
  <rect x="90" y="108" width="170" height="44" rx="6" fill="#ffeef0" stroke="#d73a49"/>
  <text x="175" y="126" text-anchor="middle" font-size="12" fill="#86181d">PolicyOp S1@1</text>
  <text x="175" y="143" text-anchor="middle" font-size="11" fill="#86181d">Deny S1 Write</text>

  <line x1="260" y1="130" x2="318" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- state -->
  <rect x="320" y="108" width="150" height="44" rx="6" fill="#fff5f5" stroke="#d73a49"/>
  <text x="395" y="130" text-anchor="middle" font-size="11" fill="#86181d">eval(S1, Write)</text>
  <text x="395" y="146" text-anchor="middle" font-size="12" fill="#86181d">= false</text>

  <!-- attempted insert -->
  <rect x="510" y="100" width="200" height="60" rx="6" fill="#fafbfc" stroke="#d1d5da" stroke-dasharray="4 3"/>
  <text x="610" y="120" text-anchor="middle" font-size="12" fill="#6a737d">attempt: Insert 'x' @0</text>
  <text x="610" y="140" text-anchor="middle" font-size="12" fill="#86181d" font-weight="bold">update_document → Err</text>
  <text x="610" y="155" text-anchor="middle" font-size="11" fill="#586069">no op emitted</text>

  <line x1="470" y1="130" x2="505" y2="130" stroke="#d73a49" stroke-width="1.5" marker-end="url(#xend)"/>

  <text x="60" y="220" font-size="12" fill="#586069">This is the pre-emptive (local) half of conflict resolution: a write requires a valid Write right at emit time.</text>
  <text x="60" y="238" font-size="12" fill="#586069">Contrast with fig2 / bulk-undo, where a concurrent deny arrives after the write and triggers retroactive undo.</text>
  <text x="60" y="256" font-size="12" fill="#586069">Here the dependency is already known to be invalid, so the document op never enters the log at all.</text>
</svg>
