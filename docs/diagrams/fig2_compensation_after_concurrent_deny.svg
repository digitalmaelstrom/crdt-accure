<svg xmlns="http://www.w3.org/2000/svg" width="780" height="380" viewBox="0 0 780 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="380" fill="#ffffff"/>
  <text x="390" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b1f23">fig2_compensation_after_concurrent_deny</text>
  <text x="390" y="48" text-anchor="middle" font-size="12" fill="#586069">A concurrent deny of S1's Write right compensates (undoes) S1's already-applied insert</text>

  <!-- swimlanes -->
  <text x="40" y="108" font-size="14" font-weight="bold" fill="#1b1f23">S1</text>
  <line x1="60" y1="100" x2="560" y2="100" stroke="#d1d5da" stroke-width="2"/>
  <text x="40" y="208" font-size="14" font-weight="bold" fill="#1b1f23">S2</text>
  <line x1="60" y1="200" x2="560" y2="200" stroke="#d1d5da" stroke-width="2"/>

  <!-- sync divider -->
  <line x1="430" y1="70" x2="430" y2="240" stroke="#959da5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="430" y="262" text-anchor="middle" font-size="11" fill="#586069">sync_pair + rebuild</text>

  <!-- S1 local op -->
  <rect x="90" y="80" width="150" height="40" rx="6" fill="#dbedff" stroke="#0366d6"/>
  <text x="165" y="98" text-anchor="middle" font-size="12" fill="#0b2e59">DocOp S1@1</text>
  <text x="165" y="113" text-anchor="middle" font-size="11" fill="#0b2e59">Insert 'a' @0  →  "a"</text>

  <!-- S2 local op -->
  <rect x="90" y="180" width="190" height="40" rx="6" fill="#ffeef0" stroke="#d73a49"/>
  <text x="185" y="198" text-anchor="middle" font-size="12" fill="#86181d">PolicyOp S2@1</text>
  <text x="185" y="213" text-anchor="middle" font-size="11" fill="#86181d">Deny S1 Write</text>

  <!-- sync arrows -->
  <line x1="240" y1="100" x2="425" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="200" x2="425" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- result box -->
  <rect x="470" y="95" width="280" height="180" rx="8" fill="#f6f8fa" stroke="#959da5"/>
  <text x="610" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b1f23">After convergence (both sites)</text>
  <text x="610" y="142" text-anchor="middle" font-size="12" fill="#86181d">eval(S1, Write) = false</text>
  <text x="610" y="164" text-anchor="middle" font-size="12" fill="#86181d">valid[S1@1] = false  (undone)</text>
  <line x1="500" y1="180" x2="720" y2="180" stroke="#d1d5da"/>
  <text x="610" y="204" text-anchor="middle" font-size="12" fill="#586069">document text:</text>
  <rect x="560" y="216" width="100" height="34" rx="4" fill="#fff" stroke="#d1d5da"/>
  <text x="610" y="238" text-anchor="middle" font-size="14" fill="#6a737d">"" (empty)</text>

  <!-- caption -->
  <text x="60" y="320" font-size="12" fill="#586069">Conflict resolution: S1's insert was concurrent with (not causally after) S2's deny, so on merge the deny</text>
  <text x="60" y="338" font-size="12" fill="#586069">retroactively invalidates the insert. render_text re-renders only currently-valid ops → the 'a' disappears.</text>
</svg>
